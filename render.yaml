# Render.com Blueprint — deploy Matevio as a Docker web service.
# In Render: New + > Blueprint > connect this repo. Render reads this file.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: matevio-chess
    runtime: docker
    # "free" = 512MB / shared CPU (sleeps when idle; analysis will be slow).
    # Upgrade to "starter" for snappy analysis.
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Postgres connection string (e.g. Neon). The VALUE is set in the Render
      # dashboard, not here (it's a secret). `sync: false` tells Render to keep
      # the dashboard value and NOT wipe it on every blueprint deploy — without
      # this, a Blueprint sync can drop a manually-added var, which is why
      # accounts kept resetting. Leave unset to fall back to ephemeral SQLite.
      - key: DATABASE_URL
        sync: false
      # Password-reset emails. Two options — set EITHER Resend OR SMTP in the
      # dashboard (values kept via sync:false). Leave all unset to disable email
      # (the one-time recovery code still works).
      #
      # Option A — Brevo (recommended, no domain needed). Verify a single sender
      # email in Brevo, then send to anyone. Free ~300/day.
      #   BREVO_API_KEY=<v3 API key, "xkeysib-...">
      #   BREVO_FROM=<your verified sender email>
      #   BREVO_FROM_NAME=Matevio   (optional display name)
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM
        sync: false
      - key: BREVO_FROM_NAME
        sync: false
      # Option B — Resend (no app password, but the free shared sender
      # onboarding@resend.dev often lands in spam without a verified domain):
      #   RESEND_API_KEY=<key from resend.com>, RESEND_FROM="Matevio <...>"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Option B — SMTP. Set SMTP_HOST/PORT for your provider:
      #   Gmail : SMTP_HOST=smtp.gmail.com  (default), SMTP_PORT=465
      #   Naver : SMTP_HOST=smtp.naver.com,           SMTP_PORT=465
      #   SMTP_USER = login id, SMTP_PASS = password (or app password),
      #   SMTP_FROM = your full email (must match the account).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Sized to fit the 512MB free tier (0.1 shared CPU). A single small engine
      # avoids the out-of-memory crash during analysis.
      - key: CC_WORKERS
        value: "1"
      - key: CC_ENGINE_THREADS
        value: "1"
      - key: CC_ENGINE_HASH_MB
        value: "16"
      - key: CC_MAX_CONCURRENT
        value: "1"
    # Render injects PORT automatically; the Docker CMD uses it.
